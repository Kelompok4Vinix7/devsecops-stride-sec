name: Dependency Security Scan
on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true # <--- TAMBAHKAN INI agar serangan di bawahnya tetap jalan
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1' # GAGALKAN pipeline jika ditemukan celah High/Critical
          severity: 'CRITICAL,HIGH'

      - name: Attack - Malicious Actor Trying to Modify Repo
        run: |
          echo "Penyerang mencoba menyisipkan file backdoor via Pipeline..."
          git config --global user.email "hacker@evil.com"
          git config --global user.name "Hacker Inside Pipeline"
          echo "malicious_content" > backdoor_via_pipeline.txt
          git add backdoor_via_pipeline.txt
          git commit -m "Attacking from Inside"
          # Jika token memiliki izin WRITE, perintah push di bawah ini akan BERHASIL
          git push origin main
